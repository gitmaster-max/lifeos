<script>
    function selectRole(element) {
        // Remove active class from all cards
        const cards = document.querySelectorAll('.selection-card');
        cards.forEach(card => card.classList.remove('active'));
        
        // Add active class to clicked card
        element.classList.add('active');
        
        // Enable continue button
        const continueBtn = document.getElementById('continue-btn');
        continueBtn.disabled = false;
        
        // Visual feedback
        element.style.transform = 'scale(0.98)';
        setTimeout(() => {
            element.style.transform = 'scale(1)';
        }, 100);
    }
</script>
<script src="assets/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.selection-card').forEach(c => c.addEventListener('click', () => {
    let t = c.textContent.replace(/\s+/g, ' ').trim();
    c.querySelectorAll('.material-symbols-outlined').forEach(s => { t = t.replace(s.textContent.trim(), '').trim(); });
    const p = LifeOS.store.get('profile', {}); p.role = t; LifeOS.store.set('profile', p);
  }));
});
</script>
