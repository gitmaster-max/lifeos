<script>
        function selectCity(element) {
            // Remove active class from all options
            document.querySelectorAll('.city-option').forEach(opt => {
                opt.classList.remove('active');
            });
            
            // Add active class to selected option
            element.classList.add('active');
            
            // Enable the continue button
            const btn = document.getElementById('continue-btn');
            btn.disabled = false;
        }

        // Simple button interaction
        document.getElementById('continue-btn').addEventListener('click', function() {
            if (!this.disabled) {
                const originalText = this.innerHTML;
                this.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span>';
                setTimeout(() => {
                    this.innerHTML = originalText;
                }, 1000);
            }
        });

        // Smooth text reveal animation on load
        window.addEventListener('DOMContentLoaded', () => {
            const elements = document.querySelectorAll('.animate-fade-in');
            elements.forEach((el, index) => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(10px)';
                el.style.transition = `all 0.6s cubic-bezier(0.16, 1, 0.3, 1) ${index * 0.15}s`;
                setTimeout(() => {
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                }, 50);
            });
        });
    </script>

<script>
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.city-option').forEach(c => c.addEventListener('click', () => {
    const city = c.textContent.replace(/\s+/g, ' ').replace(/(IST|GMT|EST|PST|CST).*$/, '').trim();
    const p = LifeOS.store.get('profile', {}); p.city = city; LifeOS.store.set('profile', p);
  }));
});
</script>
